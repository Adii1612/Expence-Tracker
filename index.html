<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenceTrack | Professional Expense Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-wallet"></i> ExpenceTrack </h1>
            <p>Data-Driven Personal Finance Tracker</p>
        </header>

        <main class="dashboard">
            <section class="card input-card">
                <h3>Log New Transaction</h3>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category-select">
                        <option value="" disabled selected>Select Category</option>
                        <option value="Education">Education</option>
                        <option value="Housing">Housing/Rent</option>
                        <option value="Travel">Transport</option>
                        <option value="Food">Food & Dining</option>
                        <option value="Leisure">Entertainment</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount-input" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date-input">
                </div>
                <button id="add-btn" class="btn-primary">Add Transaction</button>
            </section>

            <section class="card table-card">
                <div class="table-header">
                    <h3>Recent History</h3>
                    <div class="total-badge">Total: <span id="total-amount">₹0</span></div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th style="text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="expense-table-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
